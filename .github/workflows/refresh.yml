name: Refresh index

on:
  schedule:
    - cron: "0 9 * * 3"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache Winbindex by-filename responses (~40 files). Lives under runner.temp
      # so it is NOT swept into the Pages artifact (which uploads the repo dir).
      # Unique key per run + a shared restore prefix = save every run, restore the
      # latest previous; build_modules re-downloads entries older than its TTL.
      - name: Cache Winbindex data
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/winbindex-cache
          key: winbindex-${{ github.run_id }}
          restore-keys: |
            winbindex-

      - name: Run build_index.py
        env:
          WINSIGHT_BACKFILL_MONTHS: "24"
          WINSIGHT_OUTPUT: "data/index.json"
        run: |
          python scripts/build_index.py

      # Resolve affected binaries + patch-diff download links from Winbindex.
      # Non-fatal: a failure here must never block the data refresh or deploy.
      - name: Run build_modules.py
        continue-on-error: true
        env:
          WINSIGHT_OUTPUT: "data/index.json"
          WINSIGHT_MODULES_OUTPUT: "data/cve_modules.json"
          WINSIGHT_WINBINDEX_CACHE: ${{ runner.temp }}/winbindex-cache
        run: |
          python scripts/build_modules.py

      - name: Show summary
        run: |
          python -c "
          import json, os
          d = json.load(open('data/index.json'))
          print(f\"Generated: {d['generated_at']}\")
          print(f\"Total CVEs: {d['count']}\")
          print(f\"Months with data: {len(d['months_with_data'])} / {len(d['months_requested'])} requested\")
          print(f\"Distinct versions seen: {len(d['filters']['versions'])}\")
          if os.path.exists('data/cve_modules.json'):
              m = json.load(open('data/cve_modules.json'))
              print(f\"CVEs with affected modules: {m.get('count_with_modules', 0)}\")
              print(f\"CVEs with a downloadable build: {m.get('count_downloadable_cves', 0)}\")
              print(f\"Downloadable patch-diff builds: {m.get('count_downloadable_builds', 0)}\")
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Commit refreshed data
        run: |
          git config user.name "winsight-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/index.json
          [ -f data/cve_modules.json ] && git add data/cve_modules.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh index $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
