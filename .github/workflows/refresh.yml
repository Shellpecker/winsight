name: Refresh index

on:
  schedule:
    - cron: "0 9 * * 3"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/build_index.py"
      - ".github/workflows/refresh.yml"
      - "index.html"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run build_index.py
        env:
          WINSIGHT_BACKFILL_MONTHS: "24"
          WINSIGHT_OUTPUT: "data/index.json"
        run: |
          python scripts/build_index.py

      - name: Show summary
        run: |
          python -c "
          import json
          d = json.load(open('data/index.json'))
          print(f\"Generated: {d['generated_at']}\")
          print(f\"Total CVEs: {d['count']}\")
          print(f\"Months with data: {len(d['months_with_data'])} / {len(d['months_requested'])} requested\")
          print(f\"Distinct versions seen: {len(d['filters']['versions'])}\")
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Commit refreshed data
        run: |
          git config user.name "winsight-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/index.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh index $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
